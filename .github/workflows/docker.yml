name: Build & Push Docker Images

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Bridge image — the HTTP bridge + GUI server
      - name: Extract metadata (bridge)
        id: meta-bridge
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build and push bridge image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta-bridge.outputs.tags }}
          labels: ${{ steps.meta-bridge.outputs.labels }}
          cache-from: type=gha,scope=bridge
          cache-to: type=gha,mode=max,scope=bridge

      # Ping image — the local-trackerping binary (ephemeral, created and destroyed each run)
      - name: Extract metadata (ping)
        id: meta-ping
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-ping
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build and push ping image
        uses: docker/build-push-action@v5
        with:
          context: ./ping
          push: true
          tags: ${{ steps.meta-ping.outputs.tags }}
          labels: ${{ steps.meta-ping.outputs.labels }}
          cache-from: type=gha,scope=ping
          cache-to: type=gha,mode=max,scope=ping
